<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notes Summariser</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Notes Summariser</h1>
        <p class="subtitle">Paste your notes and get an instant summary</p>
        
        <textarea id="notes-input" placeholder="Paste your notes here..."></textarea>
        <button id="grammar-btn">Check Grammar</button>

    <div id="grammar-result" class="grammar-box hidden">
        <h2>Grammar Issues</h2>
        <div id="grammar-list"></div>
    </div>
        
        <button id="summarise-btn">Summarise</button>
        
        <div id="result" class="result hidden">
            <h2>Summary</h2>
            <p id="summary-text"></p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
